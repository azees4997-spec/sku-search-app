<!DOCTYPE html>
<html>
<head>
  <title>RXpress - June Data Explorer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #1e3a8a;
      --secondary: #64748b;
      --success: #10b981;
      --accent: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      --bg: #f8fafc;
      --card-bg: #ffffff;
    }

    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; line-height: 1.5; }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* Modern Search Section */
    .dashboard-card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 25px; }
    
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .table-badge { padding: 8px 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; font-size: 14px; color: #6d28d9; background: #f5f3ff; }

    .search-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; gap: 20px; }
    .input-group label { display: block; font-size: 12px; font-weight: 800; color: var(--secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select { width: 100%; padding: 14px 18px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; transition: all 0.2s; background: #fcfcfc; color: #0f172a; }
    input:focus, select:focus { border-color: #8b5cf6; background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }

    /* Action Bar */
    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding-top: 25px; border-top: 1px solid #f1f5f9; }
    .counter-group { display: flex; gap: 15px; }
    .chip { background: #f1f5f9; padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 700; color: var(--primary); border: 1px solid #e2e8f0; }
    
    .btn-group { display: flex; gap: 12px; }
    button { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 14px; }
    .btn-main { background: var(--primary); color: white; }
    .btn-main:hover { background: #1e40af; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
    .btn-outline { background: #fff; border: 2px solid #e2e8f0; color: var(--secondary); }
    .btn-outline:hover { border-color: var(--success); color: var(--success); background: #f0fdf4; }
    .btn-analytics { background: #f4f4f5; color: #18181b; border: 1px solid #e4e4e7; }
    .btn-analytics.active { background: #8b5cf6; color: white; border-color: #7c3aed; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }

    /* Analytics Dashboard Styling */
    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .analytics-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
    .analytics-title { font-size: 12px; text-transform: uppercase; font-weight: 800; color: var(--secondary); margin-bottom: 5px; }
    .analytics-val { font-size: 24px; font-weight: 900; color: var(--primary); }

    /* SELECT ALL SECTION */
    .select-all-zone { 
      background: #eff6ff; padding: 15px 25px; margin-bottom: 15px; 
      border-radius: 15px; border: 2px dashed #8b5cf6; 
      display: flex; align-items: center; gap: 15px; 
      cursor: pointer; transition: 0.2s; 
    }
    .select-all-zone:hover { background: #f5f3ff; }
    .select-all-zone label { margin: 0; cursor: pointer; font-size: 15px; font-weight: 800; color: #6d28d9; flex: 1; }
    .big-check { width: 24px; height: 24px; cursor: pointer; margin: 0; accent-color: #8b5cf6; }

    /* Modern Attractive Multicolored Premium Cards */
    .card { 
      background: white; padding: 24px; border-radius: 20px; margin-bottom: 16px; 
      display: flex; align-items: center; gap: 24px; border: 1px solid #e2e8f0; 
      position: relative; overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    /* Dynamic Left Color-Bar Border Graphic Effect */
    .card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
      background: var(--accent-gradient);
    }
    .card:hover { 
      transform: translateY(-2px);
      border-color: #cbd5e1; 
      box-shadow: 0 12px 20px -5px rgba(139, 92, 246, 0.1); 
    }
    
    .card-body { flex: 1; }
    .p-name { font-weight: 800; font-size: 20px; color: #1e3a8a; margin-bottom: 6px; letter-spacing: -0.01em; }
    .p-salt { font-size: 14px; color: #475569; margin-bottom: 14px; font-weight: 500; }
    
    /* Styled Hyperlink Salt Track Components */
    .salt-link { color: #2563eb; text-decoration: underline; cursor: pointer; font-weight: 700; transition: color 0.15s; }
    .salt-link:hover { color: #1d4ed8; background: #eff6ff; padding: 2px 4px; border-radius: 4px; }
    
    /* Vibrant Pill Badges */
    .p-footer { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .badge { padding: 6px 12px; font-size: 11px; font-weight: 800; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.03em; }
    .badge-id { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
    .badge-form { background: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8; }
    
    .p-price { font-size: 24px; font-weight: 900; color: var(--success); margin-left: auto; letter-spacing: -0.02em; }
    
    .highlight { background: #fef08a; padding: 1px 3px; border-radius: 4px; font-weight: bold; color: #854d0e; }
    .item-check { width: 22px; height: 22px; cursor: pointer; accent-color: #8b5cf6; min-width: 22px; }
    .loading-state { text-align: center; padding: 50px; color: var(--secondary); font-weight: 600; font-size: 16px; }
  </style>
</head>
<body>

<div class="container">
  <div class="dashboard-card">
    <div class="top-nav">
      <div style="font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -0.02em;">DATA EXPLORER</div>
      <div class="table-badge">Active Table: June_Data</div>
    </div>

    <div class="search-row">
      <div class="input-group">
        <label>Product Name</label>
        <input type="text" id="nameInput" placeholder="Hit Enter to Search..." onkeydown="handleEnter(event)">
      </div>
      <div class="input-group">
        <label>Molecule / Composition</label>
        <input type="text" id="saltInput" placeholder="e.g. Paracetamol" onkeydown="handleEnter(event)">
      </div>
      <div class="input-group">
        <label>Quick Form / Packaging Filter</label>
        <select id="formFilter" onchange="applyFormFilter()">
          <option value="all">All Forms / Packaging</option>
        </select>
      </div>
    </div>

    <div class="action-bar">
      <div class="counter-group">
        <div class="chip">Matches: <span id="resCount">0</span></div>
        <div class="chip">Marked: <span id="mCount">0</span></div>
      </div>
      <div class="btn-group">
        <button id="analyticsToggle" class="btn-analytics" onclick="toggleAnalyticsView()">📊 Analytics Insights</button>
        <button class="btn-main" onclick="executeSearch()">Execute Search</button>
        <button class="btn-outline" onclick="exportData(filteredData, 'june_data_export')">Export CSV</button>
        <button class="btn-outline" style="background:#f8fafc" onclick="exportMarked()">Export Marked</button>
      </div>
    </div>
  </div>

  <div id="analyticsPanel" style="display: none;"></div>

  <div class="select-all-zone" id="selectAllContainer">
    <input type="checkbox" id="selectAllBox" class="big-check" onchange="toggleSelectAll(event)"> 
    <label for="selectAllBox">Mark all visible results for download</label>
  </div>

  <div id="displayArea"></div>
</div>

<script>
  const { createClient } = supabase;
  const client = createClient(
    "https://rhxrtsjocqizhxqhbzgu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeHJ0c2pvY3Fpemh4cWhiemd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjY1MzQsImV4cCI6MjA4NjkwMjUzNH0.fa6pG3IxS05ngcpbrWCWPA5NAYF1YQ2kRn9WO__81qM"
  );

  let masterData = [];
  let filteredData = [];
  let markedItems = new Map();
  let analyticsActive = false;

  window.handleEnter = (e) => { if (e.key === 'Enter') executeSearch(); };

  function computeFuzzyScore(str1, str2) {
    const s1 = String(str1).toLowerCase();
    const s2 = String(str2).toLowerCase();
    if (s1.includes(s2) || s2.includes(s1)) return 0; 
    
    const costs = [];
    for (let i = 0; i <= s1.length; i++) {
      let lastValue = i;
      for (let j = 0; j <= s2.length; j++) {
        if (i === 0) costs[j] = j;
        else {
          if (j > 0) {
            let newValue = costs[j - 1];
            if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
              newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
            }
            costs[j - 1] = lastValue;
            lastValue = newValue;
          }
        }
      }
      if (i > 0) costs[s2.length] = lastValue;
    }
    return costs[s2.length];
  }

  function highlight(text, q) {
    if (!q || !text) return text;
    try {
      const regex = new RegExp(`(${q.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
      return text.toString().replace(regex, '<span class="highlight">$1</span>');
    } catch (e) {
      return text;
    }
  }

  window.searchBySaltDirect = function(saltName) {
    document.getElementById('nameInput').value = ""; 
    document.getElementById('saltInput').value = saltName;
    executeSearch();
  };

  window.executeSearch = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const salt = document.getElementById('saltInput').value.trim();

    document.getElementById('displayArea').innerHTML = '<div class="loading-state">Querying June_Data...</div>';
    document.getElementById('selectAllBox').checked = false;
    
    try {
      let query = client.from('June_Data').select('*');
      
      if (name) query = query.ilike('Product Name', `%${name}%`);
      if (salt) query = query.ilike('Composition', `%${salt}%`);
      
      let { data, error } = await query.limit(500);
      if (error) throw error;

      if ((!data || data.length === 0) && (name || salt)) {
        let fallbackRes = await client.from('June_Data').select('*').limit(800);
        if (fallbackRes.data) {
          data = fallbackRes.data.filter(item => {
            const targetName = String(item['Product Name'] || '').toLowerCase();
            const targetSalt = String(item['Composition'] || '').toLowerCase();
            
            const nameScore = name ? computeFuzzyScore(targetName, name) : 0;
            const saltScore = salt ? computeFuzzyScore(targetSalt, salt) : 0;
            
            return (name && nameScore <= 4) || (salt && saltScore <= 4);
          });
        }
      }

      masterData = (data || []).map(r => ({
        ...r, 
        _t: 'June_Data', 
        _id: r['Product ID'] || r.id,
        _n: r['Product Name'] || '',
        _s: r['Composition'] || 'N/A',
        // Complete data mapping properties to display packaging reliably
        _f: r['Packaging Deta'] || r['Packaging Details'] || r['Product Form'] || 'N/A',
        _p: parseFloat(r.mrp || r.mrpp || 0)
      }));

    } catch (err) {
      console.error("Error standardizing query executions:", err);
      masterData = [];
    }

    const forms = [...new Set(masterData.map(i => i._f))].filter(Boolean).sort();
    document.getElementById('formFilter').innerHTML = '<option value="all">All Forms / Packaging</option>' + forms.map(f => `<option value="${f}">${f}</option>`).join('');

    filteredData = [...masterData];
    render();
    if (analyticsActive) renderAnalytics();
  };

  window.applyFormFilter = () => {
    const val = document.getElementById('formFilter').value;
    filteredData = val === 'all' ? [...masterData] : masterData.filter(i => i._f === val);
    document.getElementById('selectAllBox').checked = false;
    render();
    if (analyticsActive) renderAnalytics();
  };

  window.toggleAnalyticsView = () => {
    analyticsActive = !analyticsActive;
    const btn = document.getElementById('analyticsToggle');
    const panel = document.getElementById('analyticsPanel');
    if (analyticsActive) {
      btn.classList.add('active');
      panel.style.display = 'block';
      renderAnalytics();
    } else {
      btn.classList.remove('active');
      panel.style.display = 'none';
    }
  };

  function renderAnalytics() {
    const panel = document.getElementById('analyticsPanel');
    if (!filteredData.length) {
      panel.innerHTML = `<div class="analytics-card" style="text-align:center;color:var(--secondary)">No active query dataset loaded to visualize dashboard.</div>`;
      return;
    }

    const prices = filteredData.map(i => i._p).filter(p => p > 0);
    const avgPrice = prices.length ? (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(2) : '0.00';
    
    let cheapestItem = { _n: 'N/A', _p: Infinity };
    filteredData.forEach(item => {
      if (item._p > 0 && item._p < cheapestItem._p) cheapestItem = item;
    });

    panel.innerHTML = `
      <div class="analytics-grid">
        <div class="analytics-card">
          <div class="analytics-title">Total Filtered Brands</div>
          <div class="analytics-val">${filteredData.length}</div>
        </div>
        <div class="analytics-card">
          <div class="analytics-title">Average Composition Price</div>
          <div class="analytics-val">₹${avgPrice}</div>
        </div>
        <div class="analytics-card">
          <div class="analytics-title">Most Economical Alternative</div>
          <div class="analytics-val" style="font-size:16px;color:var(--success);margin-top:5px;">
            ${cheapestItem._n} <span style="font-weight:900">(₹${cheapestItem._p === Infinity ? 0 : cheapestItem._p})</span>
          </div>
        </div>
      </div>
    `;
  }

  window.render = () => {
    const area = document.getElementById('displayArea');
    const nQ = document.getElementById('nameInput').value;
    const sQ = document.getElementById('saltInput').value;
    document.getElementById('resCount').innerText = filteredData.length;

    if (!filteredData.length) { area.innerHTML = '<div class="loading-state">No matches found inside June_Data table resources.</div>'; return; }

    area.innerHTML = filteredData.map((item, idx) => {
      const escapeSalt = String(item._s).replace(/'/g, "\\'");
      const displaySalt = item._s !== 'N/A' 
        ? `<span class="salt-link" onclick="searchBySaltDirect('${escapeSalt}')">${highlight(item._s, sQ)}</span>` 
        : 'N/A';

      return `
        <div class="card">
          <input type="checkbox" class="item-check" ${markedItems.has(item._id) ? 'checked' : ''} onchange="toggleMark(${idx})">
          <div class="card-body">
            <div class="p-name">${highlight(item._n, nQ)}</div>
            <div class="p-salt"><strong>Salt:</strong> ${displaySalt}</div>
            <div class="p-footer">
              <span class="badge badge-id">ID: ${item._id}</span>
              <span class="badge badge-form">Pkg: ${item._f}</span>
            </div>
          </div>
          <div class="p-price">₹${item._p}</div>
        </div>
      `;
    }).join('');
  };

  window.toggleMark = (idx) => {
    const item = filteredData[idx];
    if (markedItems.has(item._id)) markedItems.delete(item._id);
    else markedItems.set(item._id, item);
    document.getElementById('mCount').innerText = markedItems.size;
  };

  window.toggleSelectAll = (e) => {
    const isChecked = e.target.checked;
    filteredData.forEach(item => {
      if (isChecked) markedItems.set(item._id, item);
      else markedItems.delete(item._id);
    });
    render();
    document.getElementById('mCount').innerText = markedItems.size;
  };

  window.exportData = (arr, title) => {
    if (!arr.length) return alert("List is empty");
    const clean = arr.map(({_t, _id, _n, _s, _f, _p, ...rest}) => rest);
    const csv = [Object.keys(clean[0]).join(","), ...clean.map(o => Object.values(o).map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))].join("\n");
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    link.download = `${title}.csv`;
    link.click();
  };

  window.exportMarked = () => exportData(Array.from(markedItems.values()), 'marked_june_items');
</script>
</body>
</html>
