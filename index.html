<script>
  const { createClient } = supabase;

  const supabaseClient = createClient(
    "https://rhxrtsjocqizhxqhbzgu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeHJ0c2pvY3Fpemh4cWhiemd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjY1MzQsImV4cCI6MjA4NjkwMjUzNH0.fa6pG3IxS05ngcpbrWCWPA5NAYF1YQ2kRn9WO__81qM"
  );

  let currentResults = [];
  let markedItems = new Map();
  let debounceTimer;

  const searchInput = document.getElementById("searchBox");
  const saltInput = document.getElementById("saltFilter");
  const formInput = document.getElementById("formFilter");
  const filterSelect = document.getElementById("tableFilter");

  [searchInput, saltInput, formInput].forEach(el => {
    el.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(search, 400);
    });
  });
  filterSelect.addEventListener("change", search);

  async function search() {
    const keyword = searchInput.value.trim();
    const salt = saltInput.value.trim();
    const form = formInput.value.trim();
    const filter = filterSelect.value;

    if (!keyword && !salt && !form) {
      document.getElementById("results").innerHTML = "";
      return;
    }

    document.getElementById("results").innerHTML = "<div class='loading'>Searching Sahimed Database...</div>";

    async function fetchData(tableName) {
      // Logic for tables with spaces
      let query = supabaseClient.from(tableName).select("*");

      if (keyword) {
        // Fix: Use 'Product Name' for Dr codes, 'sku_name' for others
        const nameCol = (tableName === "Dr codes") ? "Product Name" : "sku_name";
        query = query.ilike(nameCol, `%${keyword}%`);
      }
      
      if (salt) {
        query = query.ilike("salt_composition", `%${salt}%`);
      }

      if (form) {
        // Fix: Use 'Product Form' for Dr codes, 'pack_size' for others
        const formCol = (tableName === "Dr codes") ? "Product Form" : "pack_size";
        query = query.ilike(formCol, `%${form}%`);
      }

      const { data, error } = await query.limit(100);
      
      if (error) {
        console.error(`Error in ${tableName}:`, error.message);
        return [];
      }
      
      return data.map(row => ({
        ...row,
        sourceLabel: tableName,
        cssClass: tableName === "Dr codes" ? "dr-codes" : "drugs",
        // Unified Mapping
        dispName: row["Product Name"] || row.sku_name || "Unknown",
        dispId: row["Product ID"] || row.sku_id || "N/A",
        dispPrice: row.mrp || 0, // Changed from mrpp to mrp to match your table
        dispForm: row["Product Form"] || row.pack_size || "N/A"
      }));
    }

    let results = [];
    if (filter === "all") {
      const r1 = await fetchData("Dr codes");
      const r2 = await fetchData("drugs_data");
      results = [...r1, ...r2];
    } else {
      results = await fetchData(filter);
    }

    currentResults = results;
    render(results);
  }

  function render(results) {
    const container = document.getElementById("results");
    if (results.length === 0) {
      container.innerHTML = "<div style='padding:20px;'>No data found in this table. Check if 'Product Name' matches your search.</div>";
      return;
    }

    let html = "";
    results.forEach((row, index) => {
      const isChecked = markedItems.has(row.dispId) ? "checked" : "";
      html += `
        <div class="card ${row.cssClass}">
          <input type="checkbox" class="checkbox-custom" ${isChecked} onchange="toggleMark(${index})">
          <div class="card-content">
            <div class="source">${row.sourceLabel}</div>
            <div class="name">${row.dispName}</div>
            <div class="details">
              <div><strong>ID:</strong> ${row.dispId}</div>
              <div><strong>Form:</strong> ${row.dispForm}</div>
              <div><strong>Salt:</strong> ${row.salt_composition || 'N/A'}</div>
              <div class="price">₹${row.dispPrice}</div>
            </div>
          </div>
        </div>`;
    });
    container.innerHTML = html;
  }

  window.toggleMark = function(index) {
    const item = currentResults[index];
    if (markedItems.has(item.dispId)) {
      markedItems.delete(item.dispId);
    } else {
      markedItems.set(item.dispId, item);
    }
    document.getElementById("markedCount").innerText = markedItems.size;
  };

  window.downloadCSV = function(data, filename) {
    if (!data || data.length === 0) return alert("Nothing to download");
    const cleanData = data.map(({cssClass, sourceLabel, dispName, dispId, dispPrice, dispForm, ...rest}) => rest);
    const headers = Object.keys(cleanData[0]);
    const csvContent = [
      headers.join(','),
      ...cleanData.map(row => headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`).join(','))
    ].join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${filename}.csv`;
    link.click();
  };

  window.downloadMarked = function() {
    downloadCSV(Array.from(markedItems.values()), 'marked_items');
  };
</script>
