<!DOCTYPE html>
<html>
<head>
  <title>Sahimed | Master SKU Search</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    
    .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .project-title { font-size: 26px; font-weight: 800; color: #1e3a8a; }
    .table-picker { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-weight: 600; background: white; }

    .search-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .search-grid { display: grid; grid-template-columns: 2fr 1.5fr 1fr; gap: 15px; }
    
    label { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 5px; display: block; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }

    .action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; pt: 15px; border-top: 1px solid #eee; }
    button { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
    .btn-primary { background: #1e3a8a; color: white; }
    .btn-green { background: #10b981; color: white; }
    .btn-blue { background: #3b82f6; color: white; }

    .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 5px solid #e2e8f0; transition: 0.2s; }
    .dr-codes { border-left-color: #f59e0b; }
    .drugs_data { border-left-color: #3b82f6; }
    .plazza_data { border-left-color: #8b5cf6; }
    
    .highlight { background: #fef08a; font-weight: bold; padding: 0 2px; border-radius: 2px; }
    .p-name { font-weight: 700; font-size: 16px; color: #1e3a8a; }
    .p-salt { font-size: 13px; color: #475569; margin: 5px 0; }
    .p-meta { display: flex; gap: 15px; font-size: 12px; color: #94a3b8; }
    .price-tag { color: #059669; font-weight: 800; font-size: 16px; }
    .check-box { width: 22px; height: 22px; cursor: pointer; }
    .loading { text-align: center; padding: 40px; font-weight: bold; color: #1e3a8a; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-section">
    <div class="project-title">Sahimed SKU Explorer</div>
    <select id="tableSelect" class="table-picker">
      <option value="all">Search All Tables</option>
      <option value="Dr codes">Dr codes</option>
      <option value="drugs_data">Drugs Data</option>
      <option value="plazza_data">Plazza Data</option>
    </select>
  </div>

  <div class="search-panel">
    <div class="search-grid">
      <div>
        <label>Product Name</label>
        <input type="text" id="nameInput" placeholder="Enter Product Name..." onkeydown="if(event.key==='Enter') executeSearch()">
      </div>
      <div>
        <label>Molecule / Salt Composition</label>
        <input type="text" id="saltInput" list="saltSuggest" placeholder="Enter Molecule..." onkeydown="if(event.key==='Enter') executeSearch()">
        <datalist id="saltSuggest"></datalist>
      </div>
      <div>
        <label>Form Filter (Auto-populated)</label>
        <select id="formFilter" onchange="applyLocalFilter()">
          <option value="all">All Forms</option>
        </select>
      </div>
    </div>

    <div class="action-row">
      <div id="status">Ready</div>
      <div style="display:flex; gap:10px;">
        <button class="btn-primary" onclick="executeSearch()">Search</button>
        <button class="btn-green" onclick="exportData(filteredData, 'sahimed_export')">Download View</button>
        <button class="btn-blue" onclick="exportMarked()">Download Marked (<span id="mCount">0</span>)</button>
      </div>
    </div>
  </div>

  <div id="displayArea"></div>
</div>

<script>

  );

  let masterData = [];

  // Highlight helper
  function highlight(text, query) {
    if (!query || !text) return text;
    const regex = new RegExp(`(${query})`, 'gi');
    return text.toString().replace(regex, '<span class="highlight">$1</span>');
  }

  async function executeSearch() {
    const nameVal = document.getElementById('nameInput').value.trim();
    const saltVal = document.getElementById('saltInput').value.trim();
    const tableVal = document.getElementById('tableSelect').value;

    document.getElementById('displayArea').innerHTML = '<div class="loading">Searching Database...</div>';
    
    async function fetchFromTable(tName) {
      let query = client.from(tName).select('*');
      const nCol = tName === 'Dr codes' ? 'Product Name' : 'sku_name';
      
      if (nameVal) query = query.ilike(nCol, `%${nameVal}%`);
      if (saltVal) query = query.ilike('salt_composition', `%${saltVal}%`);
      
      const { data, error } = await query.limit(200);
      if (error) { console.error(error); return []; }
      
      return data.map(r => ({
        ...r,
        _t: tName,
        _id: r['Product ID'] || r.sku_id || r.id,
        _n: r['Product Name'] || r.sku_name || '',
        _s: r.salt_composition || '',
        _f: r['Product Form'] || r.pack_size || 'N/A',
        _p: r.mrp || r.mrpp || 0
      }));
    }

    if (tableVal === 'all') {
      const results = await Promise.all([fetchFromTable('Dr codes'), fetchFromTable('drugs_data'), fetchFromTable('plazza_data')]);
      masterData = results.flat();
    } else {
      masterData = await fetchFromTable(tableVal);
    }

    updateFormDropdown();
    filteredData = [...masterData];
    render();
  }
