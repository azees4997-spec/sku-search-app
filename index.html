<!DOCTYPE html>
<html>
<head>
  <title>Sahimed Data Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #1e3a8a;
      --success: #059669;
      --info: #2563eb;
      --bg: #f1f5f9;
      --border: #e2e8f0;
    }

    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #0f172a; }
    .container { max-width: 1100px; margin: 0 auto; }
    
    /* Search Panel */
    .controls-wrapper { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border); }
    
    .top-row { display: flex; justify-content: flex-end; margin-bottom: 15px; }
    .table-picker { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-weight: 700; background: #fff; cursor: pointer; }

    .search-grid { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; gap: 15px; margin-bottom: 20px; }
    
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 6px; display: block; }
    input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: 0.2s; }
    input:focus { border-color: var(--info); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

    .action-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; }
    
    .stats-group { display: flex; gap: 15px; font-size: 13px; font-weight: 600; color: #475569; }
    
    .button-group { display: flex; gap: 10px; }
    button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-search { background: var(--primary); color: white; }
    .btn-view { background: var(--success); color: white; }
    .btn-marked { background: var(--info); color: white; }

    /* CRITICAL: Select All Bar */
    .select-all-container { 
      background: #fff; padding: 15px 20px; margin-bottom: 12px; 
      border-radius: 10px; border: 2px solid #3b82f6; 
      display: flex; align-items: center; gap: 12px; 
      font-weight: 800; color: #1e40af; cursor: pointer;
    }
    .select-all-container input { width: 24px; height: 24px; cursor: pointer; margin: 0; }

    /* Cards */
    .card { background: white; padding: 16px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-left: 6px solid #e2e8f0; border: 1px solid var(--border); }
    .card.Dr_codes { border-left: 6px solid #f59e0b; }
    .card.drugs_data { border-left: 6px solid #3b82f6; }
    
    .highlight { background: #fef08a; font-weight: bold; padding: 0 2px; }
    .card-body { flex: 1; }
    .p-name { font-weight: 700; font-size: 16px; color: var(--primary); }
    .p-salt { font-size: 13px; color: #475569; margin: 4px 0; }
    .price-tag { color: var(--success); font-weight: 800; font-size: 18px; margin-left: auto; }
    .check-box { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }
  </style>
</head>
<body>

<div class="container">
  <div class="controls-wrapper">
    <div class="top-row">
      <select id="tableSelect" class="table-picker">
        <option value="all">Search All Tables</option>
        <option value="Dr codes">Dr codes</option>
        <option value="drugs_data">Drugs Data</option>
        <option value="plazza_data">Plazza Data</option>
      </select>
    </div>

    <div class="search-grid">
      <div>
        <label>Product Name (Enter)</label>
        <input type="text" id="nameInput" placeholder="Search..." onkeydown="handleKey(event)">
      </div>
      <div>
        <label>Molecule / Salt</label>
        <input type="text" id="saltInput" placeholder="Salt..." onkeydown="handleKey(event)">
      </div>
      <div>
        <label>Form Filter</label>
        <select id="formFilter" onchange="applyLocalFilter()">
          <option value="all">All Forms</option>
        </select>
      </div>
    </div>

    <div class="action-bar">
      <div class="stats-group">
        <span>Matches: <span id="resCount">0</span></span>
        <span>Marked: <span id="mCount">0</span></span>
      </div>
      <div class="button-group">
        <button class="btn-search" onclick="executeSearch()">Search</button>
        <button class="btn-view" onclick="exportData(filteredData, 'view_export')">Download View</button>
        <button class="btn-marked" onclick="exportMarked()">Download Marked</button>
      </div>
    </div>
  </div>

  <div class="select-all-container" onclick="document.getElementById('selectAllBox').click()">
    <input type="checkbox" id="selectAllBox" onchange="toggleSelectAll(event)"> 
    <span>SELECT ALL VISIBLE ITEMS</span>
  </div>

  <div id="displayArea"></div>
</div>

<script>
  const { createClient } = supabase;
  const client = createClient(
    "https://rhxrtsjocqizhxqhbzgu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeHJ0c2pvY3Fpemh4cWhiemd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjY1MzQsImV4cCI6MjA4NjkwMjUzNH0.fa6pG3IxS05ngcpbrWCWPA5NAYF1YQ2kRn9WO__81qM"
  );

  let masterData = [];
  let filteredData = [];
  let markedItems = new Map();

  window.handleKey = (e) => { if (e.key === 'Enter') executeSearch(); };

  function highlight(text, q) {
    if (!q || !text) return text;
    const regex = new RegExp(`(${q.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
    return text.toString().replace(regex, '<span class="highlight">$1</span>');
  }

  window.executeSearch = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const salt = document.getElementById('saltInput').value.trim();
    const table = document.getElementById('tableSelect').value;

    document.getElementById('displayArea').innerHTML = '<center>Searching...</center>';
    document.getElementById('selectAllBox').checked = false;
    
    async function fetchTable(t) {
      let query = client.from(t).select('*');
      const nCol = t === 'Dr codes' ? 'Product Name' : 'sku_name';
      if (name) query = query.ilike(nCol, `%${name}%`);
      if (salt) query = query.ilike('salt_composition', `%${salt}%`);
      const { data } = await query.limit(500);
      return (data || []).map(r => ({
        ...r, _t: t, _id: r['Product ID'] || r.sku_id || r.id,
        _n: r['Product Name'] || r.sku_name || '',
        _s: r.salt_composition || 'N/A',
        _f: r['Product Form'] || r.pack_size || 'N/A',
        _p: r.mrp || r.mrpp || 0
      }));
    }

    if (table === 'all') {
      const all = await Promise.all([fetchTable('Dr codes'), fetchTable('drugs_data'), fetchTable('plazza_data')]);
      masterData = all.flat();
    } else {
      masterData = await fetchTable(table);
    }

    const forms = [...new Set(masterData.map(i => i._f))].filter(Boolean).sort();
    document.getElementById('formFilter').innerHTML = '<option value="all">All Forms</option>' + forms.map(f => `<option value="${f}">${f}</option>`).join('');

    filteredData = [...masterData];
    render();
  };

  window.applyLocalFilter = () => {
    const val = document.getElementById('formFilter').value;
    filteredData = val === 'all' ? [...masterData] : masterData.filter(i => i._f === val);
    document.getElementById('selectAllBox').checked = false;
    render();
  };

  window.render = () => {
    const area = document.getElementById('displayArea');
    const nQ = document.getElementById('nameInput').value;
    const sQ = document.getElementById('saltInput').value;
    document.getElementById('resCount').innerText = filteredData.length;

    if (!filteredData.length) { area.innerHTML = '<center>No results.</center>'; return; }

    area.innerHTML = filteredData.map((item, idx) => `
      <div class="card ${item._t.replace(' ', '_')}">
        <input type="checkbox" class="check-box" ${markedItems.has(item._id) ? 'checked' : ''} onchange="toggleMark(${idx})">
        <div class="card-body">
          <div class="p-name">${highlight(item._n, nQ)}</div>
          <div class="p-salt"><strong>Salt:</strong> ${highlight(item._s, sQ)}</div>
          <div style="font-size:12px; color:#64748b">Source: ${item._t} | Form: ${item._f}</div>
        </div>
        <div class="price-tag">₹${item._p}</div>
      </div>
    `).join('');
  };

  window.toggleMark = (idx) => {
    const item = filteredData[idx];
    if (markedItems.has(item._id)) markedItems.delete(item._id);
    else markedItems.set(item._id, item);
    document.getElementById('mCount').innerText = markedItems.size;
  };

  window.toggleSelectAll = (e) => {
    e.stopPropagation();
    const isChecked = e.target.checked;
    filteredData.forEach(item => {
      if (isChecked) markedItems.set(item._id, item);
      else markedItems.delete(item._id);
    });
    render();
    document.getElementById('mCount').innerText = markedItems.size;
  };

  window.exportData = (arr, title) => {
    if (!arr.length) return alert("Empty");
    const clean = arr.map(({_t, _id, _n, _s, _f, _p, ...rest}) => rest);
    const csv = [Object.keys(clean[0]).join(","), ...clean.map(o => Object.values(o).map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))].join("\n");
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    link.download = `${title}.csv`;
    link.click();
  };

  window.exportMarked = () => exportData(Array.from(markedItems.values()), 'marked_items');
</script>
</body>
</html>
