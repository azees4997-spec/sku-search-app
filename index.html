<!DOCTYPE html>
<html>
<head>
  <title>Sahimed Data Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-hover: #1e40af;
      --success: #059669;
      --info: #2563eb;
      --bg: #f8fafc;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }
    .container { max-width: 1100px; margin: 0 auto; }
    
    /* Top Control Bar */
    .controls-wrapper { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; border: 1px solid var(--border); }
    
    .top-row { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .table-picker { padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); font-weight: 600; background: #fff; cursor: pointer; outline: none; transition: border 0.2s; }
    .table-picker:focus { border-color: var(--info); }

    .search-grid { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; gap: 16px; margin-bottom: 20px; }
    
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; transition: all 0.2s; background: #fcfcfc; box-sizing: border-box; }
    input:focus, select:focus { background: #fff; border-color: var(--info); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); outline: none; }

    .action-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--border); }
    
    /* Stats & Select All Combined */
    .status-group { display: flex; align-items: center; gap: 20px; }
    .stat-badge { font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--bg); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }
    .select-all-wrapper { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--primary); }
    
    .button-group { display: flex; gap: 12px; }
    button { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 14px; }
    button:active { transform: translateY(1px); }
    .btn-search { background: var(--primary); color: white; }
    .btn-search:hover { background: var(--primary-hover); }
    .btn-view { background: var(--success); color: white; }
    .btn-view:hover { opacity: 0.9; }
    .btn-marked { background: var(--info); color: white; }

    /* Result Cards */
    .card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--border); transition: border 0.2s, transform 0.2s; }
    .card:hover { border-color: #cbd5e1; transform: translateY(-1px); }
    .card.dr-codes { border-left: 6px solid #f59e0b; }
    .card.drugs_data { border-left: 6px solid #3b82f6; }
    .card.plazza_data { border-left: 6px solid #8b5cf6; }
    
    .highlight { background: #fef08a; padding: 0 2px; border-radius: 2px; }
    .card-body { flex: 1; }
    .p-name { font-weight: 700; font-size: 17px; color: var(--primary); margin-bottom: 4px; }
    .p-salt { font-size: 13px; color: #475569; margin-bottom: 8px; }
    .p-footer { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-muted); }
    .price-tag { color: var(--success); font-weight: 800; font-size: 16px; margin-left: auto; }
    
    .check-box { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }
    .empty-state { text-align: center; padding: 60px; color: var(--text-muted); font-weight: 500; }
  </style>
</head>
<body>

<div class="container">
  <div class="controls-wrapper">
    <div class="top-row">
      <select id="tableSelect" class="table-picker" tabindex="4">
        <option value="all">All Tables</option>
        <option value="Dr codes">Dr codes</option>
        <option value="drugs_data">Drugs Data</option>
        <option value="plazza_data">Plazza Data</option>
      </select>
    </div>

    <div class="search-grid">
      <div>
        <label>Product Name</label>
        <input type="text" id="nameInput" placeholder="Press Enter to search..." tabindex="1" onkeydown="handleKey(event)">
      </div>
      <div>
        <label>Molecule / Salt</label>
        <input type="text" id="saltInput" placeholder="Highlight matches..." tabindex="2" onkeydown="handleKey(event)">
      </div>
      <div>
        <label>Form Filter</label>
        <select id="formFilter" tabindex="3" onchange="applyLocalFilter()">
          <option value="all">All Forms</option>
        </select>
      </div>
    </div>

    <div class="action-bar">
      <div class="status-group">
        <div class="stat-badge">Matches: <span id="resCount">0</span></div>
        <div class="stat-badge">Marked: <span id="mCount">0</span></div>
        <label class="select-all-wrapper">
          <input type="checkbox" id="selectAllBox" onchange="toggleSelectAll()"> Select All
        </label>
      </div>
      
      <div class="button-group">
        <button class="btn-search" onclick="executeSearch()">Search</button>
        <button class="btn-view" onclick="exportData(filteredData, 'view_export')">Download View</button>
        <button class="btn-marked" onclick="exportMarked()">Download Marked</button>
      </div>
    </div>
  </div>

  <div id="displayArea"></div>
</div>

<script>
  const { createClient } = supabase;
  const client = createClient(
    "https://rhxrtsjocqizhxqhbzgu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeHJ0c2pvY3Fpemh4cWhiemd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjY1MzQsImV4cCI6MjA4NjkwMjUzNH0.fa6pG3IxS05ngcpbrWCWPA5NAYF1YQ2kRn9WO__81qM"
  );

  let masterData = [];
  let filteredData = [];
  let markedItems = new Map();

  window.handleKey = (e) => { if (e.key === 'Enter') executeSearch(); };

  function highlight(text, q) {
    if (!q || !text) return text;
    const regex = new RegExp(`(${q.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
    return text.toString().replace(regex, '<span class="highlight">$1</span>');
  }

  window.executeSearch = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const salt = document.getElementById('saltInput').value.trim();
    const table = document.getElementById('tableSelect').value;

    document.getElementById('displayArea').innerHTML = '<div class="empty-state">Searching database...</div>';
    document.getElementById('selectAllBox').checked = false;
    
    async function fetchTable(t) {
      let query = client.from(t).select('*');
      const nCol = t === 'Dr codes' ? 'Product Name' : 'sku_name';
      if (name) query = query.ilike(nCol, `%${name}%`);
      if (salt) query = query.ilike('salt_composition', `%${salt}%`);
      const { data } = await query.limit(500);
      return (data || []).map(r => ({
        ...r, _t: t, _id: r['Product ID'] || r.sku_id || r.id,
        _n: r['Product Name'] || r.sku_name || '',
        _s: r.salt_composition || 'N/A',
        _f: r['Product Form'] || r.pack_size || 'N/A',
        _p: r.mrp || r.mrpp || 0
      }));
    }

    if (table === 'all') {
      const all = await Promise.all([fetchTable('Dr codes'), fetchTable('drugs_data'), fetchTable('plazza_data')]);
      masterData = all.flat();
    } else {
      masterData = await fetchTable(table);
    }

    const forms = [...new Set(masterData.map(i => i._f))].filter(Boolean).sort();
    document.getElementById('formFilter').innerHTML = '<option value="all">All Forms</option>' + forms.map(f => `<option value="${f}">${f}</option>`).join('');

    filteredData = [...masterData];
    render();
  };

  window.applyLocalFilter = () => {
    const val = document.getElementById('formFilter').value;
    filteredData = val === 'all' ? [...masterData] : masterData.filter(i => i._f === val);
    render();
  };

  window.render = () => {
    const area = document.getElementById('displayArea');
    const nQ = document.getElementById('nameInput').value;
    const sQ = document.getElementById('saltInput').value;
    document.getElementById('resCount').innerText = filteredData.length;

    if (!filteredData.length) { area.innerHTML = '<div class="empty-state">No results found for your search.</div>'; return; }

    area.innerHTML = filteredData.map((item, idx) => `
      <div class="card ${item._t.replace(' ', '_')}">
        <input type="checkbox" class="check-box" ${markedItems.has(item._id) ? 'checked' : ''} onchange="toggleMark(${idx})">
        <div class="card-body">
          <div class="p-name">${highlight(item._n, nQ)}</div>
          <div class="p-salt"><strong>Salt:</strong> ${highlight(item._s, sQ)}</div>
          <div class="p-footer">
            <span><strong>Source:</strong> ${item._t}</span>
            <span><strong>Form:</strong> ${item._f}</span>
          </div>
        </div>
        <div class="price-tag">₹${item._p}</div>
      </div>
    `).join('');
  };

  window.toggleMark = (idx) => {
    const item = filteredData[idx];
    if (markedItems.has(item._id)) markedItems.delete(item._id);
    else markedItems.set(item._id, item);
    document.getElementById('mCount').innerText = markedItems.size;
  };

  window.toggleSelectAll = () => {
    const isChecked = document.getElementById('selectAllBox').checked;
    filteredData.forEach(item => {
      if (isChecked) markedItems.set(item._id, item);
      else markedItems.delete(item._id);
    });
    render();
    document.getElementById('mCount').innerText = markedItems.size;
  };

  window.exportData = (arr, title) => {
    if (!arr.length) return alert("Nothing to export");
    const clean = arr.map(({_t, _id, _n, _s, _f, _p, ...rest}) => rest);
    const csv = [Object.keys(clean[0]).join(","), ...clean.map(o => Object.values(o).map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))].join("\n");
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    link.download = `${title}.csv`;
    link.click();
  };

  window.exportMarked = () => exportData(Array.from(markedItems.values()), 'marked_items');
</script>
</body>
</html>
